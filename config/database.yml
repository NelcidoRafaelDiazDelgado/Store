# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: store_development
  username: postgres
  password: postgres
  host: postgres

# Para pruebas unitarias si postgres no esta disponible
#development:
#  adapter: sqlite3
#  database: db/development.sqlite3

test:
  <<: *default
  database: store_test
  username: postgres
  password: postgres
  host: postgres

production:
  <<: *default
  database: store_production
  username: store
  password: <%= ENV["STORE_DATABASE_PASSWORD"] %>
